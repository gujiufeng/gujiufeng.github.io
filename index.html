
<!DOCTYPE html>
<html lang="en">
  
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<title>Olivia I. Tian</title>
</head>head>
  <style>
    body{
   /* tell the browser which image to use */
      background-image: url("images/background.jpg");

      /* make it fill the window nicely */
      background-size: cover;          /* scale to fill */
      background-position: center;     /* keep it centered */
      background-repeat: no-repeat;    /* don’t tile */
      background-attachment: fixed;
      background-color: #255;          /* fallback colour */
      font-family: "Arial", sans-serif;
      font-weight: bold;
      margin: 0;

      /* Container to control spacing for both h1 and button */
          .intro {
      padding-top: 25vh;
      padding-left: 7vh;
    }

       /* Button style */
    .about-button {
      display: inline-block;
      background-color: black;
      color: white;
      padding: 28px 28px;             /* size of the button (square look) */
      border-radius: 20px;
      text-decoration: none;
      font-size: 30px;
      margin-top: 7px;               /* distance between the name and the button */
      transition: background-color 0.3s, transform 0.2s; /* smooth hover effect */

      .about-button:hover {
      background-color: #333;         /* slightly lighter on hover */
      transform: scale(1.05);         /* subtle grow on hover */
    }
    }

    h1 {
      color: white;
      text-align: left;

      /* 👇 This controls the size of the text */
      font-size: 80px;   /* you can change 64px to whatever size you like */
      
    }
  </style>
<body>
  <div class="intro">
    <h1>Olivia I. Tian</h1>
    <a href="aboutMe.html" class="about-button">About Me</a>
  </div>
</body>
  
<html>
