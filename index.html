<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olivia I. Tian</title>

  <style>
    /* === General Page Setup === */
    body {
      background-image: url("images/background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #255;
      font-family: "Arial", sans-serif;
      font-weight: bold;
      margin: 0;
    }

    /* === Top Bar === */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: black;   /* black background */
      display: flex;
      justify-content: flex-start; /* links to the left */
      align-items: center;
      padding: 15px 30px;
      box-sizing: border-box;
      z-index: 100;
      color: white;
      gap: 20px;  /* 👈 space between flex items */
    }

    .navbar a {
      color: white;               /* white text */
      text-decoration: none;
      margin-left: 30px;
      font-size: 20px;
      transition: color 0.3s;
    }

    .navbar a:hover {
      color: #ffcc00; /* highlight color on hover */
    }

    /* === Intro Section (name + button) === */
    .intro {
      padding-top: 25vh; /* moves section down below navbar */
      padding-left: 7vh;
    }

    h1 {
      color: white;
      font-size: 80px;
      margin: 0;
    }

    /* === About Me Button === */
    .about-button {
      display: inline-block;
      background-color: black;
      color: white;
      padding: 28px 28px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 30px;
      margin-top: 10px;
      transition: background-color 0.3s, transform 0.2s;
    }

    .about-button:hover {
      background-color: #333;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- 🌐 Top Navigation Bar -->
  <div class="navbar">
    <a href="index.html">HOME</a>
    <a href="https://drive.google.com/file/d/1_u-T2V2hNnJ6lCmHohz8I3JINFAQW_Sp/view" target="_blank">PORTFOLIO</a>
    <a href="https://gujiufeng.itch.io" target="_blank">ITCH</a>
    <a href="paintings.html">PAINTINGS</a>
    <a href="aboutMe.html">ABOUT ME</a>    
  </div>

  <!-- ✨ Main Section -->
  <div class="intro">
    <h1>Olivia I. Tian</h1>
    <a href="aboutMe.html" class="about-button">About Me</a>
  </div>

</body>
</html>
